        fill="white" opacity="0.9"/>

  <!-- Wheels -->
  <circle cx="21" cy="38" r="5" fill="#0ea5e9" stroke="white" stroke-width="2"/>
  <circle cx="43" cy="38" r="5" fill="#0ea5e9" stroke="white" stroke-width="2"/>
  <circle cx="21" cy="38" r="2" fill="white"/>
  <circle cx="43" cy="38" r="2" fill="white"/>

  <!-- Water drop accent (top right) -->
  <path d="M50 10 C50 10 56 17 56 21 C56 24.3 53.3 27 50 27 C46.7 27 44 24.3 44 21 C44 17 50 10 50 10 Z"
        fill="white" opacity="0.9"/>

  <!-- Shine line on drop -->
  <path d="M47.5 18 C47.5 18 46 20 46 22"
        stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
